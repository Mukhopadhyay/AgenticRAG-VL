services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: [ "CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    restart: unless-stopped
    container_name: virallens
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    env_file: .env
    environment:
      # Docker overrides
      - QDRANT_URL=http://qdrant:6333
      - DATA_DIR=/app/data/raw
    volumes:
      - ./data:/app/data

  zensical:
    image: zensical/zensical:latest
    container_name: zensical
    restart: unless-stopped
    ports:
      - "9000:8000"
    volumes:
      - ./:/docs
    command: [ "serve", "--dev-addr=0.0.0.0:8000" ]
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://127.0.0.1:8000 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  qdrant_storage:
